name: Build iOS IPA (Fortress Mode)
on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🛡️ Clone Fortress Branch
        run: |
          # Clone only the fortress branch into a clean directory
          git clone --branch fortress --single-branch https://github.com/${{ github.repository }}.git fortress-build
          cd fortress-build
          
          # Ensure we're on fortress
          git checkout fortress

      - name: 📦 Setup & Install (Fortress)
        run: |
          cd fortress-build
          npm ci
          brew install just

      - name: 🏗️ Build App
        run: |
          cd fortress-build
          just archive
          just export-unsigned

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          files: fortress-build/build/ipa/*.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔄 Sync Game Logic back to Fortress
        run: |
          cd fortress-build
          git config user.name "Fortress Guardian"
          git config user.email "actions@github.com"
          
          # Copy updated game code from main workspace
          cp -r ${{ github.workspace }}/src ./src
          cp ${{ github.workspace }}/index.html ./index.html
          cp ${{ github.workspace }}/tsconfig.json ./tsconfig.json
          cp ${{ github.workspace }}/vite.config.ts ./vite.config.ts
          cp ${{ github.workspace }}/package.json ./package.json
          cp ${{ github.workspace }}/package-lock.json ./package-lock.json
          
          # Also update the trigger workflow itself
          mkdir -p .github/workflows
          cp ${{ github.workspace }}/.github/workflows/trigger.yml .github/workflows/trigger.yml
          
          git add .
          git commit -m "🚀 Sync latest game code to Fortress" || echo "No changes"
          git push origin fortress

      - name: 🧹 Cleanup
        run: |
          rm -rf fortress-build
