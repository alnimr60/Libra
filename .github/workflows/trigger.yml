name: Build iOS IPA (Fortress Mode)
on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🛡️ Checkout Fortress Branch
        run: |
          # Create a clean workspace and switch to fortress branch
          git worktree add -B fortress-worktree ./fortress-worktree origin/fortress

      - name: 📦 Setup & Install (Fortress)
        run: |
          cd fortress-worktree
          npm ci
          brew install just

      - name: 🏗️ Build App
        run: |
          cd fortress-worktree
          just archive
          just export-unsigned

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          files: fortress-worktree/build/ipa/*.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔄 Sync Game Logic back to Fortress
        run: |
          cd fortress-worktree
          git config user.name "Fortress Guardian"
          git config user.email "actions@github.com"
          
          # Pull latest game code from main
          git checkout main -- src index.html tsconfig.json vite.config.ts package.json package-lock.json .github/workflows/trigger.yml
          
          git add .
          git commit -m "🚀 Sync latest game code to Fortress" || echo "No changes"
          git push origin fortress

      - name: 🧹 Cleanup
        run: |
          git worktree remove ./fortress-worktree -f
