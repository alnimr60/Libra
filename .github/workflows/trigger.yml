name: Build iOS IPA (Fortress Mode)
on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🛡️ Restore Fortress Infrastructure
        run: |
          # Fetch fortress branch
          git fetch origin fortress
          
          # Create a temporary directory and extract fortress files
          mkdir -p fortress-temp
          git --work-tree=fortress-temp checkout origin/fortress -- ios justfile capacitor.config.ts package-lock.json
          
          # Move fortress files to workspace root
          mv fortress-temp/ios ./ios
          mv fortress-temp/justfile ./justfile
          mv fortress-temp/capacitor.config.ts ./capacitor.config.ts
          rm -rf fortress-temp

      - name: 📦 Setup & Install
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: 🏗️ Build App
        run: |
          npm ci
          brew install just
          just archive
          just export-unsigned

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          files: build/ipa/*.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔄 Sync Game Logic back to Fortress
        run: |
          # Fetch latest fortress
          git fetch origin fortress
          
          # Checkout fortress into a temp worktree
          git worktree add fortress-temp origin/fortress
          
          # Copy updated game files from current workspace to fortress temp
          cp -r ./src fortress-temp/src
          cp ./index.html fortress-temp/index.html
          cp ./tsconfig.json fortress-temp/tsconfig.json
          cp ./vite.config.ts fortress-temp/vite.config.ts
          cp ./package.json fortress-temp/package.json
          cp ./package-lock.json fortress-temp/package-lock.json
          cp ./.github/workflows/trigger.yml fortress-temp/.github/workflows/trigger.yml
          
          # Commit and push from fortress temp
          cd fortress-temp
          git config user.name "Fortress Guardian"
          git config user.email "actions@github.com"
          git add .
          git commit -m "🚀 Sync latest game code to Fortress" || echo "No changes"
          git push origin fortress
          
          # Cleanup
          cd ..
          git worktree remove fortress-temp -f
