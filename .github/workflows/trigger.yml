name: Build iOS IPA (Fortress Mode)
on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🛡️ Restore Fortress Infrastructure
        run: |
          # Fetch fortress branch
          git fetch origin fortress
          
          # Create a temporary directory and extract fortress files
          mkdir -p fortress-temp
          git --work-tree=fortress-temp checkout origin/fortress -- ios justfile capacitor.config.ts package.json package-lock.json
          
          # Move fortress files to workspace root
          mv fortress-temp/ios ./ios
          mv fortress-temp/justfile ./justfile
          mv fortress-temp/capacitor.config.ts ./capacitor.config.ts
          mv fortress-temp/package.json ./package.json
          mv fortress-temp/package-lock.json ./package-lock.json
          rm -rf fortress-temp

      - name: 📦 Setup & Install
        run: |
          npm ci
          brew install just

      - name: 🏗️ Build App
        run: |
          just archive
          just export-unsigned

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          files: build/ipa/*.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔄 Sync Game Logic back to Fortress
        run: |
          # Fetch latest fortress
          git fetch origin fortress
          
          # Clean up any leftover worktree from previous runs
          git worktree remove fortress-temp 2>/dev/null || true
          rm -rf fortress-temp
          
          # Checkout fortress into a temp worktree
          git worktree add fortress-temp origin/fortress
          
          # Move into fortress temp
          cd fortress-temp
          
          # Replace game code files with versions from the triggering commit (main)
          # This updates index and worktree, removing files not present in main
          git checkout ${{ github.sha }} -- src index.html tsconfig.json vite.config.ts .github/workflows/trigger.yml
          
          git config user.name "Fortress Guardian"
          git config user.email "actions@github.com"
          git add .
          git commit -m "🚀 Sync latest game code to Fortress" || echo "No changes"
          git push origin fortress
          
          # Cleanup
          cd ..
          git worktree remove fortress-temp -f
